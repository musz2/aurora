services:
  db:
    image: ankane/pgvector:latest
    container_name: aurora-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aurora
      POSTGRES_PASSWORD: aurora
      POSTGRES_DB: aurora
    ports:
      - "5432:5432"
    volumes:
      - aurora_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aurora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - aurora_redis_data:/data

volumes:
  aurora_db_data:
  aurora_redis_data:
